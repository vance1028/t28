services:
  db:
    image: mysql:8.0
    container_name: patriotic-edu-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: patriotic_edu
      MYSQL_USER: app
      MYSQL_PASSWORD: apppass
    ports:
      - "13306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-prootpass"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build: .
    container_name: patriotic-edu-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 4790
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: app
      DB_PASSWORD: apppass
      DB_NAME: patriotic_edu
    ports:
      - "4790:4790"

volumes:
  db_data:
